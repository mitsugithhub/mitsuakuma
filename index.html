<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyric Stamper - Portable Edition</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #121212; color: #e0e0e0;
            font-family: "Inter", "Hiragino Kaku Gothic ProN", sans-serif;
            display: flex; height: 100vh; overflow: hidden;
        }

        #sidebar {
            width: 750px; background: #1e1e1e;
            border-right: 1px solid #333;
            display: flex; flex-direction: column; padding: 20px;
        }

        #lyric-import {
            width: 100%; height: 80px;
            background: #000; border: 1px solid #444;
            color: #fff; padding: 12px; margin-bottom: 15px;
            border-radius: 8px; resize: none; font-size: 14px;
        }

        .col-tools { display: flex; gap: 10px; margin-bottom: 10px; }

        #list-container {
            flex-grow: 1; overflow-y: auto;
            border: 1px solid #333; background: #141414;
        }

        table { border-collapse: collapse; width: 100%; table-layout: fixed; }
        
        th, td { 
            border-bottom: 1px solid #222; 
            padding: 10px 5px; 
            text-align: center; 
            vertical-align: middle; 
        }

        th { background: #252525; position: sticky; top: 0; z-index: 10; cursor: pointer; height: 50px; }
        th.selected-column { background: #1a5fb4 !important; outline: 2px solid #4a90e2; }

        .lyric-cell-container {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            min-height: 75px;
            padding-left: 10px;
        }
        
        .lyric-input { 
            width: 100%; background: transparent; border: none; 
            color: #eee; font-size: 13px; font-weight: bold; padding: 5px;
        }

        .label-edit {
            width: 80%; background: rgba(0,0,0,0.3); color: #fff; border: 1px solid #555; 
            text-align: center; font-size: 11px; padding: 4px 0; border-radius: 3px;
        }

        .stamp-slot {
            width: 70px; height: 70px;
            background: #000; border: 2px solid #333;
            object-fit: cover; cursor: pointer; border-radius: 4px;
            display: block; margin: 0 auto;
        }

        .stamp-slot.active-target { border-color: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.4); }

        #main-view {
            flex-grow: 1; 
            display: flex; 
            flex-direction: column;
            background: #0a0a0a;
            overflow: hidden;
        }

        #preview-area {
            height: 60vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
            padding: 10px;
            box-sizing: border-box;
        }

        #img-display { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
            border: 1px solid #222; 
            cursor: pointer;
        }

        .main-controls { 
            flex-grow: 1;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            gap: 15px;
            border-top: 2px solid #1a1a1a;
            background: #0d0d0d;
            min-height: 220px;
        }

        .btn-group { display: flex; gap: 25px; align-items: center; }

        .btn { padding: 12px 24px; font-size: 14px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; transition: 0.1s; }
        .btn:active { transform: scale(0.92); }
        
        .btn-stamp { background: #fff; color: #000; font-size: 1.6rem; width: 260px; border-radius: 50px; }
        .btn-undo { background: #333; color: #888; width: 220px; border-radius: 50px; font-size: 0.9rem; border: 1px solid #444; }
        .btn-nav { background: #222; color: #fff; width: 80px; height: 80px; border-radius: 50%; font-size: 2.2rem; border: 2px solid #333; }
        
        .btn-add-col { background: #333; color: #eee; border: 1px solid #444; flex: 1; }
        .btn-del-col { background: #632a2a; color: #ff9999; border: 1px solid #853b3b; flex: 1; }

        #setup-overlay {
            position:absolute; inset:0; background:#000; 
            display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100;
        }

        .io-buttons {
            display: flex; gap: 10px; margin-top: 15px;
        }
    </style>
</head>
<body>

    <div id="setup-overlay">
        <h2 style="font-weight:200; letter-spacing: 2px;">画像フォルダの読み込み、またはプロジェクトの再開</h2>
        <div style="display:flex; gap:20px;">
            <button class="btn" style="background:#fff; color:#000;" onclick="document.getElementById('file-input').click()">フォルダを新規選択</button>
            <button class="btn" style="background:#4a90e2; color:#fff;" onclick="document.getElementById('project-load').click()">プロジェクトを読み込む</button>
        </div>
        <input type="file" id="file-input" webkitdirectory directory multiple style="display:none;">
        <input type="file" id="project-load" accept=".json" style="display:none;">
    </div>

    <div id="sidebar">
        <textarea id="lyric-import" placeholder="歌詞を貼り付けてください..."></textarea>
        
        <div class="col-tools">
            <button class="btn btn-add-col" onclick="addColumn()">+ 列を追加</button>
            <button class="btn btn-del-col" onclick="deleteSelectedColumn()">選択中の列を削除</button>
        </div>

        <div id="list-container">
            <table id="main-table">
                <thead><tr id="header-row"><th style="width:280px; cursor:default;">歌詞</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
        
        <div class="io-buttons">
            <button class="btn" style="background:#4a90e2; color:white; flex:1;" onclick="saveProject()">プロジェクト保存 (.json)</button>
            <button class="btn" style="background:transparent; border: 1px solid #444; color:#666;" onclick="location.reload()">リセット</button>
        </div>
    </div>

    <div id="main-view">
        <div id="preview-area">
            <img id="img-display" alt="プレビュー" onclick="randomImage()">
        </div>
        
        <div class="main-controls">
            <div class="btn-group">
                <button class="btn btn-nav" onclick="prevImage()">←</button>
                <button class="btn btn-stamp" onclick="executeStamp()">STAMP</button>
                <button class="btn btn-nav" onclick="nextImage()">→</button>
            </div>
            <button class="btn btn-undo" onclick="undo()">UNDO (元に戻す)</button>
        </div>
    </div>

    <script>
        const imgDisplay = document.getElementById('img-display');
        const tableBody = document.getElementById('table-body');
        const headerRow = document.getElementById('header-row');
        const lyricImport = document.getElementById('lyric-import');
        
        let imageFiles = [];
        let currentImageIndex = 0;
        let currentFileBase64 = "";
        let columnCount = 0;
        let selectedColumnIdx = -1; 
        let activeSlotPos = null; 
        
        let projectData = [];
        let columnLabels = [];
        let undoStack = [];

        // フォルダ読み込み
        document.getElementById('file-input').addEventListener('change', async (e) => {
            const files = Array.from(e.target.files).filter(f => /\.(png|jpe?g)$/i.test(f.name));
            if (files.length > 0) {
                imageFiles = files;
                document.getElementById('setup-overlay').style.display = 'none';
                if(columnCount === 0) ["目&口", "目のみ", "口のみ"].forEach(l => addColumn(l));
                loadImage(0);
            }
        });

        // プロジェクト読み込み（画像データも復元）
        document.getElementById('project-load').addEventListener('change', (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                const json = JSON.parse(event.target.result);
                columnLabels = json.labels || [];
                projectData = json.data || [];
                columnCount = columnLabels.length;
                
                // 歌詞エリアを復元
                lyricImport.value = projectData.map(d => d.text).join('\n');
                
                document.getElementById('setup-overlay').style.display = 'none';
                renderTable();
            };
            reader.readAsText(file);
        });

        function saveProject() {
            // projectDataの中には既にBase64化された画像が入っているので、そのまま保存
            const json = JSON.stringify({labels: columnLabels, data: projectData});
            const blob = new Blob([json], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `lyric_project_${new Date().getTime()}.json`;
            a.click();
        }

        // --- 以下、基本ロジック（変更なし） ---

        window.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            if ((e.key === 'Delete' || e.key === 'Backspace') && activeSlotPos) {
                e.preventDefault();
                saveState();
                projectData[activeSlotPos.row].images[activeSlotPos.col] = "";
                renderTable();
            }
        });

        lyricImport.addEventListener('input', () => {
            const lines = lyricImport.value.split(/\r?\n/).filter(l => l !== "");
            projectData = lines.map((line, index) => ({
                text: line,
                images: (projectData[index]) ? projectData[index].images : new Array(columnCount).fill("")
            }));
            renderTable();
        });

        function renderTable() {
            headerRow.innerHTML = '<th style="width:280px; cursor:default;">歌詞</th>';
            columnLabels.forEach((label, idx) => {
                const th = document.createElement('th');
                th.style.width = "95px";
                if(selectedColumnIdx === idx) th.classList.add('selected-column');
                th.onclick = () => { selectedColumnIdx = idx; renderTable(); };
                const input = document.createElement('input');
                input.className = 'label-edit';
                input.value = label;
                input.oninput = (e) => { columnLabels[idx] = e.target.value; };
                th.appendChild(input);
                headerRow.appendChild(th);
            });

            tableBody.innerHTML = "";
            projectData.forEach((data, rowIndex) => {
                const tr = document.createElement('tr');
                const tdLyric = document.createElement('td');
                const inputLyric = document.createElement('input');
                inputLyric.className = 'lyric-input';
                inputLyric.value = data.text;
                inputLyric.oninput = (e) => { projectData[rowIndex].text = e.target.value; };
                tdLyric.appendChild(inputLyric);
                tr.appendChild(tdLyric);

                for (let colIndex = 0; colIndex < columnCount; colIndex++) {
                    const td = document.createElement('td');
                    const img = document.createElement('img');
                    img.className = 'stamp-slot';
                    img.src = data.images[colIndex] || "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7";
                    if (activeSlotPos && activeSlotPos.row == rowIndex && activeSlotPos.col == colIndex) img.classList.add('active-target');
                    img.onclick = () => {
                        activeSlotPos = { row: rowIndex, col: colIndex };
                        if(img.src && !img.src.startsWith('data:image/gif')) imgDisplay.src = img.src;
                        renderTable();
                    };
                    td.appendChild(img);
                    tr.appendChild(td);
                }
                tableBody.appendChild(tr);
            });
        }

        function addColumn(labelName = "") {
            columnLabels.push(labelName || `枠 ${columnCount + 1}`);
            columnCount++;
            projectData.forEach(data => data.images.push(""));
            renderTable();
        }

        function deleteSelectedColumn() {
            if (selectedColumnIdx < 0) return;
            saveState();
            columnLabels.splice(selectedColumnIdx, 1);
            projectData.forEach(row => row.images.splice(selectedColumnIdx, 1));
            columnCount--;
            selectedColumnIdx = -1;
            renderTable();
        }

        function executeStamp() {
            if (!activeSlotPos || !currentFileBase64) return;
            saveState();
            projectData[activeSlotPos.row].images[activeSlotPos.col] = currentFileBase64;
            const nextRow = activeSlotPos.row + 1;
            if (nextRow < projectData.length) {
                activeSlotPos.row = nextRow;
                setTimeout(() => {
                    tableBody.rows[nextRow].cells[activeSlotPos.col + 1].querySelector('.stamp-slot').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }, 10);
            }
            renderTable();
        }

        function saveState() {
            undoStack.push({ data: JSON.parse(JSON.stringify(projectData)), labels: [...columnLabels], colCount: columnCount, activePos: activeSlotPos ? {...activeSlotPos} : null });
            if (undoStack.length > 50) undoStack.shift();
        }

        function undo() {
            if (undoStack.length === 0) return;
            const prevState = undoStack.pop();
            projectData = prevState.data; columnLabels = prevState.labels; columnCount = prevState.colCount; activeSlotPos = prevState.activePos;
            renderTable();
        }

        function loadImage(index) {
            currentImageIndex = index;
            const reader = new FileReader();
            reader.onloadend = () => { currentFileBase64 = reader.result; imgDisplay.src = currentFileBase64; };
            reader.readAsDataURL(imageFiles[index]);
        }

        function nextImage() { currentImageIndex = (currentImageIndex + 1) % imageFiles.length; loadImage(currentImageIndex); }
        function prevImage() { currentImageIndex = (currentImageIndex - 1 + imageFiles.length) % imageFiles.length; loadImage(currentImageIndex); }
        function randomImage() { currentImageIndex = Math.floor(Math.random() * imageFiles.length); loadImage(currentImageIndex); }
    </script>
</body>
</html>
